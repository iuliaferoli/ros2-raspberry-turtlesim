[workspace]
name = "ros2_turtlesim_demo"
version = "0.1.0"
description = "ROS2 turtlesim + Raspberry Pi GPIO control demo"
channels = ["robostack-staging", "conda-forge"]
platforms = ["linux-64"]  # change to linux-aarch64 if running pixi on the Pi

[tasks]
sim     = "ros2 run turtlesim turtlesim_node"
teleop  = "ros2 run turtlesim turtle_teleop_key"
build   = "colcon build --symlink-install"
nodes   = "ros2 node list"
topics  = "ros2 topic list"
hexagon = { cmd = "ros2 run turtlesim_demo hexagon_turtles", depends-on = ["build"] }

[dependencies]
ros-jazzy-desktop    = "*"
ros-jazzy-turtlesim  = "*"

[activation]
env = { ROS_DOMAIN_ID = "42" }
